<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart for you</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:'Prompt',sans-serif;
    height:100vh;
    cursor:pointer;
}

canvas{
    position:fixed;
    inset:0;
}

#ui{
    position:fixed;
    bottom:50px;
    width:100%;
    text-align:center;
    color:#ffb6c1;
    font-size:18px;
    animation:blink 2s infinite;
    transition:.5s;
    pointer-events:none;
}

@keyframes blink{
    50%{opacity:.3;}
}
</style>
</head>

<body>

<canvas id="heart"></canvas>

<div id="ui">
แตะหน้าจอเพื่อเล่นเพลง
</div>

<audio id="music" src="song.mp3" loop></audio>

<script>

const canvas=document.getElementById("heart");
const ctx=canvas.getContext("2d");

const music=document.getElementById("music");
const ui=document.getElementById("ui");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

function heart(t){

    return{

        x:16*Math.pow(Math.sin(t),3),

        y:-(13*Math.cos(t)
        -5*Math.cos(2*t)
        -2*Math.cos(3*t)
        -Math.cos(4*t))

    };

}

let time=0;

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#ff8fb1";
    ctx.font="bold 15px Prompt";
    ctx.textAlign="center";
    ctx.textBaseline="middle";

    const scale=Math.min(canvas.width,canvas.height)/34;

    // จุดศูนย์กลางจริง
    const centerX=canvas.width/2;
    const centerY=canvas.height/2;

    for(let i=0;i<65;i++){

        const p=heart(time+i*0.2);

        const x=centerX+p.x*scale;
        const y=centerY+p.y*scale;

        ctx.fillText("เค้ารักเซน😾",x,y);

    }

    time+=0.005;

    requestAnimationFrame(draw);

}

document.fonts.ready.then(draw);

function play(){

    music.play().then(()=>{

        ui.style.opacity="0";

    }).catch(()=>{});

}

window.addEventListener("click",play,{once:true});
window.addEventListener("touchstart",play,{once:true});

</script>

</body>
</html>
